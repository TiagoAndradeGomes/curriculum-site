name: Patch English CV link

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-english-cv-link.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Point English page to English CV
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index-en.html')
          data = path.read_bytes()
          old = b'href="TAG_Curriculum2Pag_20240320.pdf"'
          new = b'href="CURRICULUM_2026_EN.pdf"'
          if old in data:
              data = data.replace(old, new, 1)
              path.write_bytes(data)
          elif new in data:
              print('index-en.html already points to the English CV PDF')
          else:
              raise SystemExit('Expected CV download href was not found')
          PY

      - name: Remove one-time workflow
        run: rm -f .github/workflows/patch-english-cv-link.yml

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index-en.html .github/workflows/patch-english-cv-link.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Point English site to English CV PDF"
            git push
          fi
